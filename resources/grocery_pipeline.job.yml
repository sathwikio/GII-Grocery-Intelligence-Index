resources:
  jobs:
    grocery_intelligence_pipeline:
      name: grocery-intelligence-index
      max_concurrent_runs: 1
      tasks:
        - task_key: bronze
          spark_python_task:
            python_file: ../jobs/bronze_job.py
          libraries:
            - whl: ../dist/*.whl
          max_retries: 2
          min_retry_interval_millis: 60000
        - task_key: silver
          depends_on:
            - task_key: bronze
          spark_python_task:
            python_file: ../jobs/silver_job.py
          libraries:
            - whl: ../dist/*.whl
          max_retries: 2
          min_retry_interval_millis: 60000
        - task_key: gold
          depends_on:
            - task_key: silver
          spark_python_task:
            python_file: ../jobs/gold_job.py
          libraries:
            - whl: ../dist/*.whl
          max_retries: 2
          min_retry_interval_millis: 60000

